apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Complete Workflow with Tests, Artifacts, and Deployment

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Install dependencies and run tests
      - name: Install dependencies
        uses: docker://node:18
        run: |
          npm install

      # Step 3: Run tests and generate JUnit XML results
      - name: Run tests
        uses: docker://node:18
        run: |
          mkdir -p test-results
          npm test -- --reporter=junit --reporter-options=output=test-results/results.xml

      # Step 4: Publish test results
      - name: Publish test results
        uses: cloudbees-io/test-reporting@v1
        with:
          test-type: JUnit
          test-results-file-pattern: 'test-results/*.xml'

      # Step 5: Build artifact
      - name: Build artifact
        uses: docker://node:18
        run: |
          mkdir -p dist
          tar -czf dist/app.tar.gz app.js package.json README.md

      # Step 6: Publish artifacts
      - name: Publish build artifacts
        uses: cloudbees-io/publish-artifacts@v1
        with:
          path: 'dist/app.tar.gz'

      # Step 7: Record deployment
      - name: Record deployment to staging
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            {
              "environment": "staging",
              "application": "puzzle-game",
              "version": "1.0.0",
              "deployed_at": "${{ cloudbees.scm.sha }}",
              "status": "success"
            }
