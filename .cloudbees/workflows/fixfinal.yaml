apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Complete Workflow with Tests, Artifacts, and Deployment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Set up Node.js
        uses: docker://node:18
        shell: sh
        run: |
          node --version
          npm --version

      - name: Install dependencies
        uses: docker://node:18
        shell: sh
        run: |
          npm install

      - name: Run tests
        uses: docker://node:18
        shell: sh
        run: |
          npm test -- --reporters=default --reporters=jest-junit

      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: junit
          results-path: junit.xml

      - name: Build application
        uses: docker://node:18
        shell: sh
        run: |
          mkdir -p dist
          tar -czf dist/app.tar.gz app.js package.json

      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: puzzle-game-artifact
          version: ${{ cloudbees.scm.sha }}
          url: https://github.com/${{ cloudbees.scm.repositoryUrl }}/releases/download/${{ cloudbees.scm.sha }}/app.tar.gz

      - name: Deploy to production
        uses: docker://node:18
        shell: sh
        env:
          DEPLOY_ENV: production
        run: |
          echo "Deploying application to production environment..."
          echo "Deployment URL: https://production.example.com"
          echo "Deployment completed successfully"

      - name: Register deployment
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
          target-environment: namastey
