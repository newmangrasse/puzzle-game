apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Complete Workflow with Tests, Artifacts, and Deployment

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install dependencies
      - name: Install dependencies
        uses: docker://node:18
        run: |
          npm install

      # Step 4: Run tests
      - name: Run tests
        uses: docker://node:18
        run: |
          npm test

      # Step 5: Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v1
        with:
          test-results-pattern: 'test-results/*.xml'

      # Step 6: Build artifact
      - name: Build artifact
        uses: docker://node:18
        run: |
          mkdir -p dist
          tar -czf dist/app.tar.gz app.js package.json README.md

      # Step 7: Publish artifacts
      - name: Publish build artifacts
        uses: cloudbees-io/publish-artifacts@v1
        with:
          path: 'dist/app.tar.gz'

      # Step 8: Record deployment
      - name: Record deployment to staging
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            {
              "environment": "staging",
              "application": "puzzle-game",
              "version": "1.0.0",
              "deployed_at": "${{ cloudbees.scm.sha }}",
              "status": "success"
            }
