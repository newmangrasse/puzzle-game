apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Complete Workflow with Tests, Artifacts, and Deployment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Set up Node.js
        uses: docker://node:18
        shell: sh
        run: |
          node --version
          npm --version

      - name: Install dependencies
        uses: docker://node:18
        shell: sh
        run: |
          npm install

      - name: Fix security vulnerabilities
        uses: docker://node:18
        shell: sh
        run: |
          npm audit fix || echo "Some vulnerabilities may require manual review"

      - name: Run tests
        uses: docker://node:18
        shell: sh
        run: |
          npm test

      - name: Build application
        uses: docker://node:18
        shell: sh
        run: |
          mkdir -p dist
          tar -czf dist/app.tar.gz app.js package.json

      - name: Prepare artifacts
        uses: docker://node:18
        shell: sh
        run: |
          mkdir -p artifacts
          cp dist/app.tar.gz artifacts/
          ls -la artifacts/

      - name: Deploy to staging
        uses: docker://node:18
        shell: sh
        env:
          DEPLOY_ENV: staging
        run: |
          echo "Deploying application to staging environment..."
          echo "Deployment URL: https://staging.example.com"
          echo "Deployment completed successfully"
