apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Complete Workflow with Tests, Artifacts, and Deployment

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Step 2: Install dependencies
      - name: Install dependencies
        uses: docker://node:18
        run: |
          npm install

      # Step 3: Run tests and generate results
      - name: Run tests
        uses: docker://node:18
        run: |
          mkdir -p test-results
          npm test 2>&1 | tee test-results/test-output.txt || true

      # Step 4: Publish test results using publish-evidence-item
      - name: Publish test results
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            {
              "testType": "unit-tests",
              "testResults": "See test-results artifacts",
              "status": "completed"
            }

      # Step 5: Build artifact
      - name: Build artifact
        uses: docker://node:18
        run: |
          mkdir -p dist
          tar -czf dist/app.tar.gz app.js package.json README.md

      # Step 6: Publish test results as artifacts
      - name: Publish test output
        uses: cloudbees-io/publish-artifacts@v1
        with:
          path: 'test-results/'

      # Step 7: Publish build artifacts
      - name: Publish build artifacts
        uses: cloudbees-io/publish-artifacts@v1
        with:
          path: 'dist/app.tar.gz'

      # Step 8: Record deployment
      - name: Record deployment to staging
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            {
              "environment": "staging",
              "application": "puzzle-game",
              "version": "1.0.0",
              "deployed_at": "${{ cloudbees.scm.sha }}",
              "status": "success"
            }
