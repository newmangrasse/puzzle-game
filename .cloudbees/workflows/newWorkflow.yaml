apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow

name: Complete Workflow with Tests, Artifacts, and Deployment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    steps:
      # Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Set up Node.js
      - name: Set up Node.js
        uses: docker://node:18
        shell: sh
        run: |
          node --version
          npm --version

      # Install dependencies
      - name: Install dependencies
        uses: docker://node:18
        shell: sh
        run: |
          npm install

      # Run tests
      - name: Run tests
        uses: docker://node:18
        shell: sh
        run: |
          npm test -- --coverage --reporters=default --reporters=jest-junit

      # Build the application
      - name: Build application
        uses: docker://node:18
        shell: sh
        run: |
          npm run build

      # Prepare artifacts
      - name: Prepare artifacts
        uses: docker://node:18
        shell: sh
        run: |
          mkdir -p artifacts
          cp -r build/* artifacts/ 2>/dev/null || cp -r dist/* artifacts/ 2>/dev/null || echo "Build output copied"

      # Simulate deployment
      - name: Deploy to staging
        uses: docker://node:18
        shell: sh
        env:
          DEPLOY_ENV: staging
        run: |
          echo "Deploying application to staging environment..."
          echo "Deployment URL: https://staging.example.com"
          echo "Deployment completed successfully"
